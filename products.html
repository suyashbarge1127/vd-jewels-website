<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collections | VD Jewels Artison</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 40px;
            margin-top: 50px;
        }
        .product-card {
            background: white;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: var(--transition);
        }
        .product-card:hover {
            transform: translateY(-10px);
        }
        .product-img {
            width: 100%;
            height: 450px;
            object-fit: cover;
            margin-bottom: 20px;
        }
        .style-code {
            font-size: 0.8rem;
            color: var(--accent-gold);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .filter-nav {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 50px;
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
        }
        .filter-btn {
            background: none;
            border: none;
            font-size: 0.9rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            color: var(--text-light);
            padding: 5px 10px;
            transition: var(--transition);
        }
        .filter-btn.active {
            color: var(--accent-gold);
            border-bottom: 2px solid var(--accent-gold);
        }
    </style>
</head>
<body>
    <nav id="navbar" class="scrolled">
        <div class="container">
            <a href="index.html" class="logo">
                <img src="assets/logo_uploaded.png" alt="VD JEWELS ARTISON">
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="products.html">Collections</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="nav-icons">
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </nav>

    <section class="section-padding" style="margin-top: 80px;">
        <div class="container">
            <div class="filter-nav">
                <button class="filter-btn active" data-category="all">All Pieces</button>
                <button class="filter-btn" data-category="necklaces">Necklaces</button>
                <button class="filter-btn" data-category="earrings">Earrings</button>
                <button class="filter-btn" data-category="rings">Rings</button>
                <button class="filter-btn" data-category="bracelets">Bracelets</button>
            </div>

            <div id="gallery-grid" class="product-grid">
                <!-- Products will be loaded here -->
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 VD Jewels Artison Pvt Ltd. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <script src="main.js"></script>
    <script>
        const categories = {
            'necklaces': {
                name: 'Necklace',
                images: [
                    'assets/VDDNE25834 F-2.jpg',
                    'assets/VDDNE27594-4.png',
                    'assets/VDDNE51377-3.png',
                    'assets/VDDNE51381-1.jpg',
                    'assets/VDDNE51431-5.png',
                    'assets/VDDNK14751..jpg'
                ]
            },
            'earrings': {
                name: 'Earrings',
                images: [
                    'assets/VDDEO12620.png',
                    'assets/VDDEO12752.png',
                    'assets/VDDEO13872.jpg',
                    'assets/VDDEO13876.jpg',
                    'assets/VDDEO13889 ..jpg',
                    'assets/VDDEO14877.jpg'
                ]
            },
            'rings': {
                name: 'Ring',
                images: [
                    'assets/VDDRO13446..jpg',
                    'assets/VDDRO13486.jpg',
                    'assets/VDDRO13488.jpg',
                    'assets/VDDRO13489.jpg',
                    'assets/VDDRO13512.jpg',
                    'assets/VDDRO13521..jpg',
                    'assets/VDDRO13521.jpg',
                    'assets/VDDRO14335..jpg',
                    'assets/VDDRO14982.jpg',
                    'assets/VDDRO14983.jpg',
                    'assets/VDDRO14993.jpg'
                ]
            },
            'bracelets': {
                name: 'Bracelet',
                images: [
                    'assets/VDDBO12824.jpg',
                    'assets/VDDBR12827.png',
                    'assets/VDDBR13279.png',
                    'assets/VDDBR13316.jpg'
                ]
            }
        };

        const galleryGrid = document.getElementById('gallery-grid');
        
        function renderGallery(filter = 'all') {
            let productsHTML = '';
            
            Object.keys(categories).forEach(catKey => {
                if (filter === 'all' || filter === catKey) {
                    const cat = categories[catKey];
                    cat.images.forEach(imgSrc => {
                        const styleCode = imgSrc.split('/').pop().split('.')[0];
                        productsHTML += `
                            <div class="product-card fade-in appear">
                                <img src="${imgSrc}" alt="${cat.name} ${styleCode}" class="product-img">
                                <h3 class="serif">${cat.name}</h3>
                                <div class="style-code">Style: ${styleCode}</div>
                            </div>
                        `;
                    });
                }
            });
            
            galleryGrid.innerHTML = productsHTML;
        }

        // Filter functionality
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                renderGallery(e.target.dataset.category);
            });
        });

        // Initial render
        renderGallery();
    </script>
</body>
</html>
